<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <script>
      // GitHub Pages SPA redirect
      // Preserves the path and redirects to index.html
      var path = window.location.pathname;
      sessionStorage.setItem('redirect', path);
      window.location.replace('/');
    </script>
  </head>
</html>
